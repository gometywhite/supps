<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Supplement Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #e8e4de;
    color: #2a2520;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  h1 {
    font-size: 15px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #999; margin-bottom: 8px; text-align: center;
  }

  .date-bar { text-align: center; font-size: 12px; color: #aaa; margin-bottom: 20px; }

  .card {
    background: #fdfcf9; border-radius: 16px; padding: 20px;
    margin-bottom: 14px; border: 1px solid #e0d9ce;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .card-name { font-size: 17px; font-weight: 600; color: #2a2520; }
  .card-goal { font-size: 12px; color: #2a2520; }

  .bar-track { background: #eee; border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: 12px; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.3s ease; }
  .bar-fill.mag  { background: linear-gradient(90deg, #4f8ef7, #7b5ea7); }
  .bar-fill.zinc { background: linear-gradient(90deg, #f7924f, #e05c5c); }
  .bar-fill.vd   { background: linear-gradient(90deg, #f7c94f, #f0a030); }

  .status-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .status-text { color: #2a2520; }
  .status-pct  { font-weight: 700; font-size: 15px; color: #2a2520; }
  .status-done { color: #2e9e5b; font-weight: 600; }

  .input-row { display: flex; gap: 8px; margin-top: 14px; align-items: center; }

  .add-btn {
    background: #2a2520; border: none; border-radius: 10px;
    color: #fff; font-size: 14px; font-weight: 600;
    padding: 10px 0; cursor: pointer; flex: 1;
  }
  .add-btn:active { opacity: 0.8; }

  .reset-btn {
    background: none; border: none; color: #ccc;
    font-size: 12px; cursor: pointer; margin-top: 8px;
    display: block; text-align: right; width: 100%;
  }

  .log-row { font-size: 12px; color: #2a2520; margin-top: 6px; min-height: 16px; }

  .toggle-card {
    background: #fdfcf9; border-radius: 16px; padding: 20px;
    margin-bottom: 14px; border: 1px solid #e0d9ce;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .toggle-card.done { border-color: #b6e8ce; background: #f2fbf6; }
  .toggle-left .card-name { font-size: 17px; font-weight: 600; }
  .toggle-left .card-goal { font-size: 12px; color: #2a2520; margin-top: 2px; }

  .toggle-pill {
    width: 48px; height: 28px; border-radius: 99px;
    background: #ddd; position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .toggle-pill.on { background: #2e9e5b; }
  .toggle-knob {
    position: absolute; top: 4px; left: 4px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #fdfcf9; transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle-pill.on .toggle-knob { transform: translateX(20px); }

  /* Calendar */
  .cal-section {
    background: #fdfcf9; border-radius: 16px; padding: 20px;
    margin-top: 24px; border: 1px solid #e0d9ce;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .cal-title { font-size: 14px; font-weight: 600; color: #888; }
  .cal-nav { display: flex; gap: 12px; }
  .cal-nav button { background: none; border: none; color: #bbb; font-size: 20px; cursor: pointer; padding: 0 4px; }
  .cal-nav button:hover { color: #555; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }

  .cal-day-label {
    text-align: center; font-size: 10px; color: #ccc;
    padding-bottom: 6px; font-weight: 600; letter-spacing: 0.05em;
  }

  .cal-day {
    border-radius: 8px; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 5px 2px 4px; font-size: 11px; color: #bbb;
    background: #f0ece4; min-height: 60px; cursor: default;
  }
  .cal-day.has-data { cursor: pointer; }
  .cal-day.has-data:active { opacity: 0.7; }
  .cal-day.today { color: #2a2520; font-weight: 700; border: 1.5px solid #bbb; }
  .cal-day.empty { background: transparent; min-height: 0; cursor: default; }
  .cal-day.all-done { background: #d4edda; color: #1a5c2e; }
  .cal-day.all-done.today { border-color: #2e9e5b; }

  .cal-day-num { font-size: 11px; font-weight: 600; margin-bottom: 3px; }

  .cal-vals { font-size: 8px; text-align: center; line-height: 1.6; }
  .cal-vals .v-mag  { color: #7b5ea7; }
  .cal-vals .v-zinc { color: #e05c5c; }
  .cal-vals .v-vd   { color: #c08000; }
  .cal-vals .v-b    { color: #2e9e5b; }
  .cal-vals .v-none { color: #ccc; }
  .cal-day.all-done .cal-vals .v-none { color: #a0c8a8; }

  .cal-legend {
    display: flex; gap: 16px; margin-top: 14px; justify-content: center;
    flex-wrap: wrap;
  }
  .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #bbb; }
  .leg-swatch { width: 14px; height: 14px; border-radius: 4px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #fdfcf9; border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px; width: 100%; max-width: 480px;
  }

  .modal-title {
    font-size: 14px; font-weight: 600; color: #888;
    text-align: center; margin-bottom: 20px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }

  .modal-row { margin-bottom: 16px; }
  .modal-label { font-size: 13px; color: #888; margin-bottom: 6px; }

  .modal-input {
    width: 100%; background: #ede9e1; border: 1px solid #d0c9be;
    border-radius: 10px; color: #2a2520; font-size: 16px;
    padding: 10px 14px; outline: none; -webkit-appearance: none;
  }

  .modal-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid #f0ece4;
  }
  .modal-toggle-label { font-size: 15px; font-weight: 500; color: #2a2520; }

  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .modal-btn {
    flex: 1; padding: 13px; border-radius: 12px;
    font-size: 15px; font-weight: 600; border: none; cursor: pointer;
  }
  .modal-btn.save { background: #2a2520; color: #fff; }
  .modal-btn.cancel { background: #ede9e1; color: #2a2520; }
</style>
</head>
<body>

<h1>Daily Supplements</h1>
<div class="date-bar" id="dateBar"></div>

<!-- Magnesium -->
<div class="card">
  <div class="card-header">
    <span class="card-name">Magnesium</span>
    <span class="card-goal">Goal: 200 mg</span>
  </div>
  <div class="bar-track"><div class="bar-fill mag" id="magBar" style="width:0%"></div></div>
  <div class="status-row">
    <span class="status-text" id="magStatus">0 mg taken</span>
    <span class="status-pct" id="magPct">0%</span>
  </div>
  <div class="log-row" id="magLog"></div>
  <div class="input-row">
    <button class="add-btn" onclick="addFixed('mag', 15)">+15</button>
    <button class="add-btn" onclick="addFixed('mag', 30)">+30</button>
    <button class="add-btn" onclick="addFixed('mag', 37.5)">+37.5</button>
  </div>
  <button class="reset-btn" onclick="resetDose('mag')">Reset</button>
</div>

<!-- Zinc -->
<div class="card">
  <div class="card-header">
    <span class="card-name">Zinc</span>
    <span class="card-goal">Goal: 15 mg</span>
  </div>
  <div class="bar-track"><div class="bar-fill zinc" id="zincBar" style="width:0%"></div></div>
  <div class="status-row">
    <span class="status-text" id="zincStatus">0 mg taken</span>
    <span class="status-pct" id="zincPct">0%</span>
  </div>
  <div class="log-row" id="zincLog"></div>
  <div class="input-row">
    <button class="add-btn" onclick="addFixed('zinc', 2.5)">+2.5</button>
    <button class="add-btn" onclick="addFixed('zinc', 3.75)">+3.75</button>
  </div>
  <button class="reset-btn" onclick="resetDose('zinc')">Reset</button>
</div>

<!-- Vitamin D -->
<div class="card">
  <div class="card-header">
    <span class="card-name">Vitamin D</span>
    <span class="card-goal">Goal: 500 IU</span>
  </div>
  <div class="bar-track"><div class="bar-fill vd" id="vdBar" style="width:0%"></div></div>
  <div class="status-row">
    <span class="status-text" id="vdStatus">0 IU taken</span>
    <span class="status-pct" id="vdPct">0%</span>
  </div>
  <div class="log-row" id="vdLog"></div>
  <div class="input-row">
    <button class="add-btn" onclick="addFixed('vd', 500)">+500 IU</button>
  </div>
  <button class="reset-btn" onclick="resetDose('vd')">Reset</button>
</div>

<!-- B Complex -->
<div class="toggle-card" id="bCard" onclick="toggleB()">
  <div class="toggle-left">
    <div class="card-name">B Complex</div>
    <div class="card-goal">Drops / tablet / yeast</div>
  </div>
  <div class="toggle-pill" id="bPill"><div class="toggle-knob"></div></div>
</div>

<!-- Calendar -->
<div class="cal-section">
  <div class="cal-header">
    <span class="cal-title" id="calTitle"></span>
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="cal-legend">
    <div class="cal-legend-item"><div class="leg-swatch" style="background:#d4edda"></div> All goals met</div>
    <div class="cal-legend-item"><div class="leg-swatch" style="background:#f0ece4"></div> Partial / none</div>
  </div>
  <p style="text-align:center;font-size:11px;color:#ccc;margin-top:10px;">Tap any day to edit</p>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>

    <div class="modal-row">
      <div class="modal-label">Magnesium (mg)</div>
      <input class="modal-input" id="editMag" type="number" placeholder="0" min="0" max="1000">
    </div>

    <div class="modal-row">
      <div class="modal-label">Zinc (mg)</div>
      <input class="modal-input" id="editZinc" type="number" placeholder="0" min="0" max="200">
    </div>

    <div class="modal-row">
      <div class="modal-label">Vitamin D (IU)</div>
      <input class="modal-input" id="editVd" type="number" placeholder="0" min="0" max="10000">
    </div>

    <div class="modal-toggle">
      <span class="modal-toggle-label">B Complex</span>
      <div class="toggle-pill" id="editBPill" onclick="toggleEditB()"><div class="toggle-knob"></div></div>
    </div>

    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
const GOALS = { mag: 200, zinc: 15, vd: 500 };
const UNITS = { mag: 'mg', zinc: 'mg', vd: 'IU' };
const DAY_LABELS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
let calYear, calMonth, editingDate, editBState;
const memStore = {};

function storageGet(k) { try { return localStorage.getItem(k); } catch { return memStore[k]||null; } }
function storageSet(k,v) { try { localStorage.setItem(k,v); } catch { memStore[k]=v; } }
function todayKey() { return new Date().toLocaleDateString('en-CA'); }

function loadState(dateStr) {
  try {
    const raw = storageGet('supp-tracker-' + dateStr);
    return raw ? JSON.parse(raw) : { mag:0, zinc:0, vd:0, b:false };
  } catch { return { mag:0, zinc:0, vd:0, b:false }; }
}

function saveState(state, dateStr) {
  try { storageSet('supp-tracker-'+(dateStr||todayKey()), JSON.stringify(state)); }
  catch(e) { console.warn(e); }
}

function allDone(s) {
  return s.mag > 0 && s.zinc > 0 && s.vd > 0 && s.b;
}

function render(state) {
  document.getElementById('dateBar').textContent = new Date().toLocaleDateString('en-US', {
    weekday:'long', month:'long', day:'numeric'
  });

  ['mag','zinc','vd'].forEach(key => {
    const goal = GOALS[key], val = state[key], unit = UNITS[key];
    const pct  = Math.min(100, Math.round((val/goal)*100));
    const done = val >= goal;
    document.getElementById(key+'Bar').style.width = pct+'%';
    document.getElementById(key+'Pct').textContent = pct+'%';
    document.getElementById(key+'Status').innerHTML = done
      ? '<span class="status-done">✓ Goal met</span>' : val+' '+unit+' taken';
    document.getElementById(key+'Log').textContent = done
      ? val+' '+unit+' total' : Math.max(0,goal-val)+' '+unit+' to go';
  });

  const bPill = document.getElementById('bPill');
  const bCard = document.getElementById('bCard');
  state.b ? bPill.classList.add('on') : bPill.classList.remove('on');
  state.b ? bCard.classList.add('done') : bCard.classList.remove('done');

  renderCalendar();
}

function renderCalendar() {
  const now = new Date();
  if (calYear===undefined) { calYear=now.getFullYear(); calMonth=now.getMonth(); }

  document.getElementById('calTitle').textContent = new Date(calYear,calMonth,1)
    .toLocaleDateString('en-US',{month:'long',year:'numeric'});

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  DAY_LABELS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calYear,calMonth,1).getDay();
  const daysInMonth = new Date(calYear,calMonth+1,0).getDate();
  const todayStr = todayKey();

  for (let i=0; i<firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFuture = dateStr > todayStr;
    const s = loadState(dateStr);
    const done = allDone(s);

    const el = document.createElement('div');
    el.className = 'cal-day' +
      (dateStr===todayStr ? ' today' : '') +
      (!isFuture && done ? ' all-done' : '');

    const numEl = document.createElement('div');
    numEl.className = 'cal-day-num';
    numEl.textContent = d;
    el.appendChild(numEl);

    if (!isFuture) {
      const vals = document.createElement('div');
      vals.className = 'cal-vals';
      vals.innerHTML =
        `<span class="${s.mag>0?'v-mag':'v-none'}">${s.mag>0?s.mag+'mg':'—'}</span><br>`+
        `<span class="${s.zinc>0?'v-zinc':'v-none'}">${s.zinc>0?s.zinc+'mg':'—'}</span><br>`+
        `<span class="${s.vd>0?'v-vd':'v-none'}">${s.vd>0?s.vd+'IU':'—'}</span><br>`+
        `<span class="${s.b?'v-b':'v-none'}">${s.b?'✓B':'—'}</span>`;
      el.appendChild(vals);

      el.classList.add('has-data');
      el.addEventListener('click', () => openModal(dateStr));
    }

    grid.appendChild(el);
  }
}

function openModal(dateStr) {
  editingDate = dateStr;
  const s = loadState(dateStr);
  editBState = s.b;

  const d = new Date(dateStr+'T12:00:00');
  document.getElementById('modalTitle').textContent = d.toLocaleDateString('en-US',{
    weekday:'long', month:'long', day:'numeric'
  });

  document.getElementById('editMag').value  = s.mag  || '';
  document.getElementById('editZinc').value = s.zinc || '';
  document.getElementById('editVd').value   = s.vd   || '';

  const pill = document.getElementById('editBPill');
  editBState ? pill.classList.add('on') : pill.classList.remove('on');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingDate = null;
}

function toggleEditB() {
  editBState = !editBState;
  const pill = document.getElementById('editBPill');
  editBState ? pill.classList.add('on') : pill.classList.remove('on');
}

function saveEdit() {
  if (!editingDate) return;
  const state = {
    mag:  parseFloat(document.getElementById('editMag').value)  || 0,
    zinc: parseFloat(document.getElementById('editZinc').value) || 0,
    vd:   parseFloat(document.getElementById('editVd').value)   || 0,
    b: editBState
  };
  saveState(state, editingDate);
  if (editingDate === todayKey()) render(state);
  else renderCalendar();
  closeModal();
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target===this) closeModal();
});

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth>11) { calMonth=0; calYear++; }
  if (calMonth<0)  { calMonth=11; calYear--; }
  renderCalendar();
}

function addFixed(key, amount) {
  const state = loadState(todayKey());
  state[key] = Math.round((state[key]+amount)*100)/100;
  saveState(state);
  render(state);
}

function resetDose(key) {
  const state = loadState(todayKey());
  state[key] = 0;
  saveState(state);
  render(state);
}

function toggleB() {
  const state = loadState(todayKey());
  state.b = !state.b;
  saveState(state);
  render(state);
}

render(loadState(todayKey()));
</script>
</body>
</html>
